<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shauqi Cell - Spesialis Service HP & Elektro</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 0; background-color: #000; color: #333;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-image: url('https://i.postimg.cc/GpJ6mp59/images-(2).jpg'); 
            background-size: cover;
            background-position: center;
            opacity: 0.35; 
        }
        
        header { 
            background: linear-gradient(rgba(0, 74, 153, 0.7), rgba(0, 74, 153, 0.7)), 
                        url('https://i.postimg.cc/43ZmbDdh/1776953571300.png');
            background-size: cover;
            background-position: center;
            color: #fff; 
            padding: 60px 20px 110px 20px; 
            text-align: center;
            position: relative;
            border-bottom: 5px solid #ffeb3b;
        }
        
        #jam-digital {
            font-family: 'Courier New', Courier, monospace;
            font-size: 45px; 
            font-weight: bold;
            color: #ffeb3b;
            text-shadow: 3px 3px 6px rgba(0,0,0,1);
        }

        .header-content { display: flex; align-items: center; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .logo-header { width: 110px; height: 110px; border-radius: 15px; border: 4px solid #fff; background: #fff; }
        header h1 { margin: 0; font-size: 55px; text-shadow: 3px 3px 6px rgba(0,0,0,0.8); color: #ffeb3b; }

        .running-text { 
            background-color: #ffeb3b; color: #ff0000; padding: 5px 0; 
            font-weight: 900; font-size: 28px; border-bottom: 2px solid #004a99;
            font-style: italic;
        }

        .container { 
            width: 94%; max-width: 900px; margin: 30px auto; 
            background: rgba(255, 255, 255, 0.85); 
            padding: 30px; border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            backdrop-filter: blur(10px);
        }
        
        .section-title { border-bottom: 3px solid #004a99; display: inline-block; margin-bottom: 20px; padding-bottom: 5px; color: #004a99; }

        /* STYLE FORM & HASIL ULASAN */
        .review-section {
            background: #fff; padding: 25px; border-radius: 15px;
            border: 2px solid #004a99; margin-top: 20px;
        }
        .review-section input, .review-section textarea, .review-section select {
            width: 100%; padding: 12px; margin: 10px 0;
            border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box;
        }
        .btn-submit {
            background: #004a99; color: white; padding: 15px; border: none;
            border-radius: 8px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer;
        }

        /* DAFTAR ULASAN YANG MUNCUL */
        #daftar-ulasan { margin-top: 20px; }
        .ulasan-item {
            background: #f1f1f1; padding: 15px; border-radius: 10px;
            margin-bottom: 10px; border-left: 5px solid #ffeb3b;
        }
        .ulasan-nama { font-weight: bold; color: #004a99; margin-bottom: 5px; }
        .ulasan-bintang { color: #f39c12; margin-bottom: 5px; }

        .footer { text-align: center; padding: 50px; color: #fff; background: rgba(0, 0, 0, 0.9); }
    </style>
</head>
<body>

<header>
    <div class="header-content">
        <img src="https://i.postimg.cc/43ZmbDdh/1776953571300.png" class="logo-header">
        <h1>𝒔𝒉𝒂𝒖𝒒𝒊 𝒄𝒆𝒍𝒍</h1>
    </div>
    <div id="jam-digital">00 : 00 : 00 WITA</div>
</header>

<div class="running-text">
    <marquee scrollamount="12">SHAUQI CELL - SPESIALIS SERVICE HP & ELEKTRONIK - HUB: 087840957071 - BERGARANSI</marquee>
</div>

<div class="container">
    <section>
        <h2 class="section-title">📍 Lokasi Kami</h2>
        <p>Desa Langgea, Kec. Ranomeeto, Sulawesi Tenggara</p>
    </section>

    <hr>

    <section id="ulasan">
        <h2 class="section-title">⭐ Berikan Penilaian</h2>
        <div class="review-section">
            <form id="formUlasan" action="https://formspree.io/f/xdayjkez" method="POST">
                <input type="text" id="inputNama" name="Nama" placeholder="Nama Akun / Nama Lengkap" required>
                <input type="email" name="Email" placeholder="Email Anda" required>
                
                <select id="inputBintang" name="Bintang">
                    <option value="⭐⭐⭐⭐⭐">⭐⭐⭐⭐⭐ (Sangat Puas)</option>
                    <option value="⭐⭐⭐⭐">⭐⭐⭐⭐ (Puas)</option>
                    <option value="⭐⭐⭐">⭐⭐⭐ (Cukup)</option>
                </select>
                
                <textarea id="inputPesan" name="Pesan" rows="3" placeholder="Tulis ulasan Anda..." required></textarea>
                <button type="submit" class="btn-submit">Kirim & Tampilkan Ulasan</button>
            </form>
        </div>

        <h3 style="margin-top: 30px;">💬 Ulasan Pelanggan Terbaru:</h3>
        <div id="daftar-ulasan">
            </div>
    </section>
</div>

<div class="footer">
    <p><strong>𝒔𝒉𝒂𝒖𝒒𝒊 𝒄𝒆𝒍𝒍</strong> © 2026</p>
</div>

<script>
    // FUNGSI JAM DIGITAL
    function updateJam() {
        const skr = new Date();
        const opsi = { timeZone: 'Asia/Makassar', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
        const waktu = new Intl.DateTimeFormat('en-GB', opsi).format(skr);
        document.getElementById('jam-digital').innerHTML = waktu.replace(/\./g, ' : ') + " WITA";
    }
    setInterval(updateJam, 1000);
    updateJam();

    // FUNGSI MENAMPILKAN ULASAN SECARA REAL-TIME
    const form = document.getElementById('formUlasan');
    const wadahUlasan = document.getElementById('daftar-ulasan');

    // Ambil ulasan dari penyimpanan lokal jika ada
    let ulasanSimpanan = JSON.parse(localStorage.getItem('dataUlasan')) || [];

    function tampilkanUlasan() {
        wadahUlasan.innerHTML = '';
        ulasanSimpanan.forEach((item) => {
            const div = document.createElement('div');
            div.className = 'ulasan-item';
            div.innerHTML = `
                <div class="ulasan-nama">👤 ${item.nama}</div>
                <div class="ulasan-bintang">${item.bintang}</div>
                <div class="ulasan-teks">"${item.pesan}"</div>
            `;
            wadahUlasan.prepend(div); // Munculkan yang terbaru di atas
        });
    }

    form.addEventListener('submit', function() {
        const nama = document.getElementById('inputNama').value;
        const bintang = document.getElementById('inputBintang').value;
        const pesan = document.getElementById('inputPesan').value;

        const ulasanBaru = { nama, bintang, pesan };
        ulasanSimpanan.push(ulasanBaru);
        localStorage.setItem('dataUlasan', JSON.stringify(ulasanSimpanan));
        
        // Form akan tetap mengirim data ke Formspree (email Anda)
    });

    // Jalankan saat halaman dibuka
    tampilkanUlasan();
</script>

</body>
</html>
